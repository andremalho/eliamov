services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_DB: eliamov_db
      POSTGRES_USER: eliamov_user
      POSTGRES_PASSWORD: eliamov_pass
    ports:
      - "5433:5432"
    volumes:
      - eliamov_postgres_data:/var/lib/postgresql/data
    networks:
      - eliamov-network

  backend:
    build: ./backend
    ports:
      - "3001:3001"
    env_file:
      - ./backend/.env
    volumes:
      - ./backend:/app
      - /app/node_modules
    depends_on:
      - postgres
    networks:
      - eliamov-network
    command: sh -c "npm install && npm run start:dev"

  frontend:
    build: ./frontend
    ports:
      - "5174:5174"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend
    networks:
      - eliamov-network
    command: sh -c "rm -rf node_modules/.vite && npm install && npm run dev -- --host 0.0.0.0 --port 5174"

volumes:
  eliamov_postgres_data:

networks:
  eliamov-network:
    driver: bridge
